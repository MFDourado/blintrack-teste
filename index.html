<!--
  ============================================================
  BLINCAST — Painel Operacional para TV (mostruário / loop)
  ============================================================
  • Abrir em qualquer player/navegador em tela cheia (16:9).
  • Os dados são SIMULADOS e se atualizam sozinhos em loop.
  • Para usar dados reais: troque a função gerarDados() no final.

  --- LOGO OFICIAL ---------------------------------------------
  A logo abaixo é uma reconstrução vetorial (símbolo play + wordmark)
  nas cores da marca. Para usar a arte oficial, substitua o bloco
  <svg class="logo"> ... </svg> (ou <img>) por:
     <img class="logo" src="SUA_LOGO.png" alt="Blincast" />
  (use a versão wordmark branco/amarelo sobre fundo escuro)
  --------------------------------------------------------------
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Blincast · Painel Operacional</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --gold:#F5C518;
    --gold-soft:rgba(245,197,24,.18);
    --graphite:#1F2127;
    --bg:#141619;
    --surface:#1F2127;
    --surface-2:#23262d;
    --line:rgba(255,255,255,.06);
    --line-gold:rgba(245,197,24,.22);
    --txt:#F4F2EA;
    --txt-dim:#8A8D93;
    --live:#4ADE80;
    --pad: clamp(12px, 1.6vw, 28px);
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{ height:100%; background:var(--bg); overflow:hidden; }

  body{
    font-family:'Sora', system-ui, sans-serif;
    color:var(--txt);
    -webkit-font-smoothing:antialiased;
    /* leve textura/vinheta de "sala de controle" */
    background:
      radial-gradient(120% 80% at 50% -10%, #20232a 0%, var(--bg) 55%),
      var(--bg);
  }

  .stage{
    height:100vh;
    width:100vw;
    display:flex;
    flex-direction:column;
    padding:var(--pad);
    gap:var(--pad);
  }

  /* ---------------- HEADER ---------------- */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:var(--pad);
  }
  .brand{ display:flex; align-items:center; gap:.7vw; }
  .logo{ height:clamp(26px,3.1vw,52px); width:auto; display:block; }
  .brand-sub{
    font-family:'IBM Plex Mono', monospace;
    font-size:clamp(9px,.78vw,13px);
    letter-spacing:.28em;
    color:var(--txt-dim);
    text-transform:uppercase;
    border-left:1px solid var(--line);
    padding-left:.9vw;
    margin-left:.3vw;
  }

  .head-right{ display:flex; align-items:center; gap:clamp(14px,1.6vw,30px); }

  .live{
    display:flex; align-items:center; gap:.55vw;
    font-family:'IBM Plex Mono', monospace;
    font-size:clamp(10px,.85vw,15px);
    letter-spacing:.22em;
    color:var(--live);
    text-transform:uppercase;
  }
  .dot{
    width:.62vw; height:.62vw; min-width:8px; min-height:8px;
    border-radius:50%; background:var(--live);
    box-shadow:0 0 0 0 rgba(74,222,128,.6);
    animation:pulse 2.4s infinite;
  }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(74,222,128,.55); }
    70%{ box-shadow:0 0 0 .9vw rgba(74,222,128,0); }
    100%{ box-shadow:0 0 0 0 rgba(74,222,128,0); }
  }
  .clock{
    font-family:'IBM Plex Mono', monospace;
    font-size:clamp(15px,1.7vw,30px);
    font-weight:500;
    letter-spacing:.05em;
    font-variant-numeric:tabular-nums;
  }
  .clock .date{
    display:block; text-align:right;
    font-size:clamp(8px,.72vw,12px);
    letter-spacing:.2em; color:var(--txt-dim);
    text-transform:uppercase;
  }

  /* ---------------- KPI ROW ---------------- */
  .kpis{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:var(--pad);
  }
  .kpi{
    position:relative;
    background:linear-gradient(180deg,var(--surface) 0%,var(--surface-2) 100%);
    border:1px solid var(--line);
    border-radius:clamp(10px,.9vw,16px);
    padding:clamp(14px,1.3vw,26px);
    overflow:hidden;
  }
  .kpi::before{
    content:""; position:absolute; inset:0 auto 0 0; width:3px;
    background:var(--gold);
  }
  .kpi .label{
    font-size:clamp(9px,.78vw,14px);
    letter-spacing:.16em; text-transform:uppercase;
    color:var(--txt-dim); font-weight:500;
  }
  .kpi .value{
    margin-top:.5vh;
    font-size:clamp(28px,3.6vw,68px);
    font-weight:800; line-height:1;
    font-variant-numeric:tabular-nums;
    letter-spacing:-.02em;
  }
  .kpi .value .unit{ font-size:.42em; color:var(--gold); font-weight:600; margin-left:.15em; }
  .kpi .delta{
    margin-top:.6vh;
    font-family:'IBM Plex Mono', monospace;
    font-size:clamp(9px,.74vw,13px);
    color:var(--live);
  }
  .kpi .delta.down{ color:#F87171; }

  /* ---------------- MAIN GRID ---------------- */
  .grid{
    flex:1;
    display:grid;
    grid-template-columns:2.1fr 1fr;
    grid-template-rows:1fr 1fr;
    gap:var(--pad);
    min-height:0;
  }
  .panel{
    background:linear-gradient(180deg,var(--surface) 0%,var(--surface-2) 100%);
    border:1px solid var(--line);
    border-radius:clamp(10px,.9vw,16px);
    padding:clamp(14px,1.2vw,24px);
    display:flex; flex-direction:column;
    min-height:0; min-width:0;
  }
  .panel.chart{ grid-row:1 / span 2; }
  .panel h2{
    font-size:clamp(11px,.92vw,16px);
    font-weight:600; letter-spacing:.12em; text-transform:uppercase;
    color:var(--txt); margin-bottom:.4vh;
    display:flex; align-items:center; justify-content:space-between;
  }
  .panel h2 .tag{
    font-family:'IBM Plex Mono', monospace; font-weight:400;
    font-size:.72em; color:var(--gold); letter-spacing:.1em;
  }

  /* line chart */
  #lineChart{ flex:1; width:100%; min-height:0; display:block; }

  /* donut / gauge */
  .gauge-wrap{ flex:1; display:flex; align-items:center; gap:clamp(12px,1.4vw,28px); }
  .gauge{ position:relative; width:clamp(90px,9vw,170px); aspect-ratio:1; flex:none; }
  .gauge svg{ width:100%; height:100%; transform:rotate(-90deg); }
  .gauge .track{ fill:none; stroke:var(--line); stroke-width:10; }
  .gauge .prog{ fill:none; stroke:var(--gold); stroke-width:10; stroke-linecap:round;
    transition:stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1); }
  .gauge .center{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
  }
  .gauge .center b{ font-size:clamp(18px,2vw,38px); font-weight:800; font-variant-numeric:tabular-nums; }
  .gauge .center span{ font-size:clamp(8px,.7vw,12px); color:var(--txt-dim); letter-spacing:.14em; text-transform:uppercase; }
  .gauge-meta{ display:flex; flex-direction:column; gap:.9vh; }
  .gauge-meta .row{ display:flex; align-items:baseline; gap:.5vw; }
  .gauge-meta .row b{ font-size:clamp(15px,1.5vw,26px); font-weight:700; font-variant-numeric:tabular-nums; }
  .gauge-meta .row small{ font-size:clamp(9px,.74vw,13px); color:var(--txt-dim); letter-spacing:.1em; text-transform:uppercase; }

  /* bars */
  .bars{ flex:1; display:flex; flex-direction:column; justify-content:center; gap:clamp(8px,1.1vh,18px); }
  .bar-row{ display:grid; grid-template-columns:clamp(56px,5.4vw,100px) 1fr auto; align-items:center; gap:.8vw; }
  .bar-row .name{ font-size:clamp(10px,.84vw,15px); color:var(--txt-dim); white-space:nowrap; }
  .bar-track{ height:clamp(8px,.85vw,14px); background:var(--line); border-radius:99px; overflow:hidden; }
  .bar-fill{ height:100%; border-radius:99px;
    background:linear-gradient(90deg,#9a7c0e,var(--gold));
    width:0%; transition:width 1.1s cubic-bezier(.4,0,.2,1); }
  .bar-row .num{ font-family:'IBM Plex Mono', monospace; font-size:clamp(10px,.8vw,14px);
    font-variant-numeric:tabular-nums; min-width:3ch; text-align:right; }

  /* ---------------- TICKER ---------------- */
  .ticker{
    height:clamp(28px,3vw,46px);
    border:1px solid var(--line-gold);
    border-radius:99px;
    background:rgba(245,197,24,.04);
    display:flex; align-items:center; overflow:hidden; position:relative;
  }
  .ticker .badge{
    flex:none; height:100%; display:flex; align-items:center;
    padding:0 clamp(12px,1.2vw,22px);
    background:var(--gold); color:var(--graphite);
    font-weight:700; font-size:clamp(9px,.78vw,13px);
    letter-spacing:.16em; text-transform:uppercase;
    border-radius:99px 0 0 99px;
  }
  .ticker .track{
    flex:1; overflow:hidden; white-space:nowrap;
  }
  .ticker .move{
    display:inline-block; padding-left:100%;
    font-family:'IBM Plex Mono', monospace;
    font-size:clamp(10px,.84vw,15px);
    color:var(--txt);
    animation:scroll 34s linear infinite;
  }
  .ticker .move span{ color:var(--gold); margin:0 .4em; }
  @keyframes scroll{ from{ transform:translateX(0); } to{ transform:translateX(-100%); } }

  @media (prefers-reduced-motion: reduce){
    .dot{ animation:none; }
    .ticker .move{ animation-duration:90s; }
  }
</style>

    <div class="head-right">
      <div class="live"><span class="dot"></span> Ao vivo</div>
      <div class="clock">
        <span id="time">--:--:--</span>
        <span class="date" id="date">—</span>
      </div>
    </div>
  </header>

  <!-- KPIs -->
  <div class="kpis" id="kpis"></div>

  <!-- MAIN -->
  <div class="grid">
    <div class="panel chart">
      <h2>Exibições por minuto <span class="tag" id="chartTag">tempo real</span></h2>
      <canvas id="lineChart"></canvas>
    </div>

    <div class="panel">
      <h2>Disponibilidade da rede <span class="tag">uptime</span></h2>
      <div class="gauge-wrap">
        <div class="gauge">
          <svg viewBox="0 0 120 120">
            <circle class="track" cx="60" cy="60" r="52"/>
            <circle class="prog" id="gaugeArc" cx="60" cy="60" r="52"/>
          </svg>
          <div class="center"><b id="gaugeVal">0%</b><span>online</span></div>
        </div>
        <div class="gauge-meta">
          <div class="row"><b id="mOnline">0</b><small>telas online</small></div>
          <div class="row"><b id="mOff">0</b><small>offline</small></div>
          <div class="row"><b id="mResp">0<small style="font-size:.6em"> ms</small></b><small>latência</small></div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Exibições por região <span class="tag">hoje</span></h2>
      <div class="bars" id="bars"></div>
    </div>
  </div>

  <!-- TICKER -->
  <div class="ticker">
    <div class="badge">Status</div>
    <div class="track"><div class="move" id="ticker"></div></div>
  </div>

</div>

<script>
(function(){
  "use strict";

  /* ---------- relógio ---------- */
  const elTime = document.getElementById('time');
  const elDate = document.getElementById('date');
  const dias = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  function tick(){
    const d = new Date();
    const p = n => String(n).padStart(2,'0');
    elTime.textContent = `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
    elDate.textContent = `${dias[d.getDay()]}, ${d.getDate()} ${meses[d.getMonth()]}`;
  }
  tick(); setInterval(tick,1000);

  /* ---------- definição dos KPIs ---------- */
  // base = valor inicial, jit = variação por ciclo, unit, fmt
  const KPIS = [
    { label:'Telas ativas',     base:621,    jit:6,    unit:'',  dec:0 },
    { label:'Exibições hoje',   base:184250, jit:1400, unit:'',  dec:0 },
    { label:'Campanhas no ar',  base:38,     jit:2,    unit:'',  dec:0 },
    { label:'Hotéis conectados',base:112,    jit:1,    unit:'',  dec:0 },
  ];
  const elKpis = document.getElementById('kpis');
  const kpiState = KPIS.map(k=>{
    const node = document.createElement('div');
    node.className='kpi';
    node.innerHTML = `<div class="label">${k.label}</div>
      <div class="value"><span class="num">0</span><span class="unit">${k.unit}</span></div>
      <div class="delta">—</div>`;
    elKpis.appendChild(node);
    return { def:k, cur:k.base, numEl:node.querySelector('.num'), deltaEl:node.querySelector('.delta') };
  });

  function fmt(n,dec){
    return Number(n).toLocaleString('pt-BR',{minimumFractionDigits:dec,maximumFractionDigits:dec});
  }
  // anima count-up de a -> b
  function animateNum(el,from,to,dec,dur=1200){
    const t0=performance.now();
    function frame(t){
      const k=Math.min(1,(t-t0)/dur);
      const e=1-Math.pow(1-k,3); // easeOutCubic
      el.textContent=fmt(from+(to-from)*e,dec);
      if(k<1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  function updateKpis(){
    kpiState.forEach(s=>{
      const prev=s.cur;
      const next=Math.max(0, Math.round(prev + (Math.random()*2-1)*s.def.jit));
      animateNum(s.numEl, prev, next, s.def.dec);
      const diff=next-prev;
      s.deltaEl.textContent=(diff>=0?'▲ +':'▼ ')+fmt(Math.abs(diff),0)+' vs. ciclo anterior';
      s.deltaEl.className='delta'+(diff<0?' down':'');
      s.cur=next;
    });
  }

  /* ---------- gauge (uptime) ---------- */
  const arc=document.getElementById('gaugeArc');
  const R=52, C=2*Math.PI*R;
  arc.style.strokeDasharray=C;
  arc.style.strokeDashoffset=C;
  const gVal=document.getElementById('gaugeVal');
  const mOn=document.getElementById('mOnline'), mOff=document.getElementById('mOff'), mResp=document.getElementById('mResp');
  let uptime=99.4;
  function updateGauge(){
    uptime=Math.min(100, Math.max(97.5, uptime + (Math.random()*2-1)*0.4));
    arc.style.strokeDashoffset = C*(1-uptime/100);
    const total=kpiState[0].cur;
    const online=Math.round(total*uptime/100);
    animateNum(gVal,parseFloat(gVal.textContent)||0,uptime,1);
    setTimeout(()=>gVal.textContent=uptime.toFixed(1)+'%',1150);
    mOn.textContent=fmt(online,0);
    mOff.textContent=fmt(total-online,0);
    mResp.innerHTML=fmt(Math.round(28+Math.random()*40),0)+'<small style="font-size:.6em"> ms</small>';
  }

  /* ---------- barras (regiões) ---------- */
  const REGIOES=['Sudeste','Nordeste','Sul','Centro-O.','Norte'];
  const elBars=document.getElementById('bars');
  const barState=REGIOES.map((r,i)=>{
    const row=document.createElement('div');
    row.className='bar-row';
    row.innerHTML=`<div class="name">${r}</div>
      <div class="bar-track"><div class="bar-fill"></div></div>
      <div class="num">0</div>`;
    elBars.appendChild(row);
    return { name:r, fill:row.querySelector('.bar-fill'), num:row.querySelector('.num'),
             val:[42,26,18,9,5][i] };
  });
  function updateBars(){
    barState.forEach(b=>{
      b.val=Math.max(3, Math.round(b.val + (Math.random()*2-1)*4));
    });
    const max=Math.max(...barState.map(b=>b.val));
    barState.forEach(b=>{
      b.fill.style.width=(b.val/max*100).toFixed(1)+'%';
      b.num.textContent=b.val+'%';
    });
  }

  /* ---------- ticker ---------- */
  const tickerEl=document.getElementById('ticker');
  function updateTicker(){
    const msgs=[
      `Rede operando normalmente <span>•</span>`,
      `${fmt(kpiState[1].cur,0)} exibições registradas hoje <span>•</span>`,
      `${kpiState[2].cur} campanhas ativas no ar <span>•</span>`,
      `Uptime médio ${uptime.toFixed(1)}% nas últimas 24h <span>•</span>`,
      `${kpiState[3].cur} hotéis conectados à rede Blincast <span>•</span>`,
      `Sincronização automática de conteúdo a cada 15s <span>•</span>`,
    ];
    tickerEl.innerHTML = msgs.join(' ');
  }

  /* ---------- gráfico de linha (canvas, rolando) ---------- */
  const cv=document.getElementById('lineChart');
  const ctx=cv.getContext('2d');
  let W=0,H=0,dpr=Math.min(window.devicePixelRatio||1,2);
  const N=120;                       // pontos visíveis
  let data=new Array(N).fill(0).map((_,i)=>50+Math.sin(i/9)*18+Math.random()*8);
  let target=data[N-1];
  function resize(){
    const r=cv.getBoundingClientRect();
    W=r.width; H=r.height;
    cv.width=W*dpr; cv.height=H*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize',resize);

  function draw(){
    ctx.clearRect(0,0,W,H);
    if(W===0){ requestAnimationFrame(draw); return; }
    const pad=10;
    const min=Math.min(...data), max=Math.max(...data);
    const range=(max-min)||1;
    const x=i=> (i/(N-1))*W;
    const y=v=> H-pad - ((v-min)/range)*(H-pad*2);

    // grid horizontal
    ctx.strokeStyle='rgba(255,255,255,.045)'; ctx.lineWidth=1;
    for(let g=0; g<=4; g++){ const gy=pad+(g/4)*(H-pad*2);
      ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }

    // área preenchida
    const grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'rgba(245,197,24,.30)');
    grad.addColorStop(1,'rgba(245,197,24,0)');
    ctx.beginPath();
    ctx.moveTo(x(0),y(data[0]));
    for(let i=1;i<N;i++) ctx.lineTo(x(i),y(data[i]));
    ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
    ctx.fillStyle=grad; ctx.fill();

    // linha
    ctx.beginPath();
    ctx.moveTo(x(0),y(data[0]));
    for(let i=1;i<N;i++) ctx.lineTo(x(i),y(data[i]));
    ctx.strokeStyle='#F5C518'; ctx.lineWidth=2.4;
    ctx.shadowColor='rgba(245,197,24,.6)'; ctx.shadowBlur=12;
    ctx.stroke();
    ctx.shadowBlur=0;

    // ponta brilhante
    ctx.beginPath();
    ctx.arc(x(N-1),y(data[N-1]),4,0,Math.PI*2);
    ctx.fillStyle='#F5C518'; ctx.fill();
    ctx.beginPath();
    ctx.arc(x(N-1),y(data[N-1]),9,0,Math.PI*2);
    ctx.fillStyle='rgba(245,197,24,.25)'; ctx.fill();

    requestAnimationFrame(draw);
  }

  const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  // rolagem contínua da série (efeito "dados em movimento")
  function scrollData(){
    target += (Math.random()*2-1)*6;
    target = Math.max(20, Math.min(95, target));
    const last=data[N-1];
    data.push(last+(target-last)*0.12 + (Math.random()*2-1)*1.5);
    data.shift();
  }
  if(!reduce) setInterval(scrollData, 110);

  /* ---------- ciclo geral ---------- */
  function cycle(){ updateKpis(); updateGauge(); updateBars(); updateTicker(); }

  // boot
  resize();
  requestAnimationFrame(draw);
  cycle();
  setInterval(cycle, 6000);   // atualiza KPIs/gauge/barras a cada 6s

})();
</script>
